<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Shop</title>
    <script src="minishop.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../docs/minishop.css">
</head>
<body>
    <div class="topbar p-2 text-center">
        <h1>🌳HI WELCOME TO MINI GREEN SHOP 🛍</h1>
    </div>
    <div class="search-bar">
        <div class="container d-flex">
            <div class="logo me-3">Mini Green Shop 🍃 </div>
            <input id="searchInput" onkeyup="searchProduct()" class="form-control me-3" placeholder="Tìm sản phẩm...">
            <select onchange="sortPrice(this.value)" class="form-select w-auto me-3">
                <option value="default">Sắp xếp</option>
                <option value="asc">Giá tăng dần</option>
                <option value="desc">Giá giảm dần</option>
            </select>
            <div class="position-relative">
                <button class="btn btn-light" onclick="openCart()">🛒</button>
                <span id="cartCount" class="cart-badge">0</span>
            </div>
        </div>
    </div>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="sidebar">
                  <h3> <b> 🏷 Danh mục</b></h3>
                    <ul class="list-unstyled">
                        <li><a href="#" onclick="filterCategory('all')" ><b>💎 Tất cả</b></a></li>
                        <li><a href="#" onclick="filterCategory('Áo')">👕 Quần áo</a></li>
                        <li><a href="#" onclick="filterCategory('Giày')">👞 Giày dép</a></li>
                        <li><a href="#" onclick="filterCategory('Phụ kiện')">👒 Phụ kiện</a></li>
                        <li><a href="#" onclick="filterCategory('Học tập')">📚 Học tập</a></li>
                        <li><a href="#" onclick="filterCategory('Dụng cụ')">🔨 Dụng cụ</a></li>
                        <li><a href="#" onclick="filterCategory('Khác')">📦 Khác</a></li>
                    </ul>
                </div>
            </div>
            <div class="col-md-9">
                <div class="row" id="productList"></div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="productModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body" id="productDetail"></div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="cartModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Giỏ hàng</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="cartItems"></div>
                <div class="modal-footer">
                    <h5>Tổng: <span id="totalPrice">0</span> đ</h5>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>

</body>

</html>
